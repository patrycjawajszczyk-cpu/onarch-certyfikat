<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weryfikacja certyfikatu — ON-ARCH</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;1,400&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Montserrat', sans-serif;
    background: #f5f3f0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }

  .logo-area {
    text-align: center;
    margin-bottom: 40px;
  }

  .logo-circle {
    width: 72px;
    height: 72px;
    background: #8B3A3A;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 12px;
  }

  .logo-text {
    color: white;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-align: center;
    line-height: 1.3;
  }

  .school-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    color: #1a1a1a;
    font-style: italic;
  }

  .card {
    background: white;
    border-radius: 12px;
    padding: 48px;
    width: 100%;
    max-width: 560px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
  }

  h1 {
    font-size: 22px;
    font-weight: 600;
    color: #1a1a1a;
    margin-bottom: 8px;
    text-align: center;
  }

  .subtitle {
    font-size: 13px;
    color: #888;
    text-align: center;
    margin-bottom: 36px;
  }

  .input-row {
    display: flex;
    gap: 12px;
  }

  input {
    flex: 1;
    padding: 14px 18px;
    border: 1.5px solid #e0e0e0;
    border-radius: 8px;
    font-family: 'Montserrat', sans-serif;
    font-size: 14px;
    color: #1a1a1a;
    outline: none;
    transition: border-color 0.2s;
  }

  input:focus {
    border-color: #8B3A3A;
  }

  input::placeholder {
    color: #bbb;
  }

  button {
    padding: 14px 24px;
    background: #8B3A3A;
    color: white;
    border: none;
    border-radius: 8px;
    font-family: 'Montserrat', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
    white-space: nowrap;
  }

  button:hover { background: #7a3030; }
  button:disabled { background: #ccc; cursor: not-allowed; }

  .result {
    margin-top: 32px;
    display: none;
  }

  .result-valid {
    border-left: 4px solid #2e7d32;
    background: #f1f8f1;
    border-radius: 0 8px 8px 0;
    padding: 24px;
  }

  .result-invalid {
    border-left: 4px solid #c62828;
    background: #fdf1f1;
    border-radius: 0 8px 8px 0;
    padding: 24px;
  }

  .result-status {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
  }

  .status-icon {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }

  .icon-valid { background: #2e7d32; color: white; }
  .icon-invalid { background: #c62828; color: white; }

  .status-text {
    font-size: 16px;
    font-weight: 600;
  }

  .text-valid { color: #2e7d32; }
  .text-invalid { color: #c62828; }

  .cert-details {
    display: grid;
    gap: 12px;
  }

  .detail-row {
    display: flex;
    gap: 12px;
  }

  .detail-label {
    font-size: 11px;
    font-weight: 600;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    min-width: 130px;
    padding-top: 2px;
  }

  .detail-value {
    font-size: 14px;
    color: #1a1a1a;
    font-weight: 500;
  }

  .divider {
    height: 1px;
    background: #e8e8e8;
    margin: 16px 0;
  }

  .cert-number {
    font-family: 'Montserrat', sans-serif;
    font-size: 12px;
    color: #aaa;
    text-align: center;
    margin-top: 16px;
  }

  .loading {
    text-align: center;
    padding: 20px;
    color: #888;
    font-size: 13px;
    display: none;
  }

  .spinner {
    display: inline-block;
    width: 20px;
    height: 20px;
    border: 2px solid #e0e0e0;
    border-top-color: #8B3A3A;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-right: 8px;
    vertical-align: middle;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  footer {
    margin-top: 32px;
    font-size: 11px;
    color: #bbb;
    text-align: center;
  }
</style>
</head>
<body>

<div class="logo-area">
  <div class="logo-circle">
    <div class="logo-text">ON<br>ARCH</div>
  </div>
  <div class="school-name">ON-ARCH Akademia</div>
</div>

<div class="card">
  <h1>Weryfikacja certyfikatu</h1>
  <p class="subtitle">Wpisz numer certyfikatu aby potwierdzić jego autentyczność</p>

  <div class="input-row">
    <input type="text" id="numer" placeholder="np. ONARCH/2026/007/RAP" 
           onkeydown="if(event.key==='Enter') sprawdz()">
    <button onclick="sprawdz()" id="btn">Sprawdź</button>
  </div>

  <div class="loading" id="loading">
    <span class="spinner"></span> Weryfikuję...
  </div>

  <div class="result" id="result"></div>
</div>

<footer>
  ON-ARCH Barbara Szczesna-Dyńska · biuro@on-arch.pl · on-arch.pl
</footer>

<script>
const SUPABASE_URL = 'https://ifwgpyajezqholhaofab.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlmd2dweWFqZXpxaG9saGFvZmFiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3MzI2MTQsImV4cCI6MjA4OTMwODYxNH0.r_ApzDBVuLA_I9vvBaGmBEC67VO950yhMeW_kiAs9To';

async function sprawdz() {
  const numer = document.getElementById('numer').value.trim();
  if (!numer) return;

  const btn = document.getElementById('btn');
  const loading = document.getElementById('loading');
  const result = document.getElementById('result');

  btn.disabled = true;
  loading.style.display = 'block';
  result.style.display = 'none';

  try {
    const res = await fetch(
      SUPABASE_URL + '/rest/v1/certyfikaty?numer=eq.' + encodeURIComponent(numer) +
      '&select=imie_nazwisko,kurs,data_ukonczenia,data_wydania,status,numer',
      {
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': 'Bearer ' + SUPABASE_KEY
        }
      }
    );

    const data = await res.json();

    loading.style.display = 'none';
    result.style.display = 'block';

    if (data && data.length > 0) {
      const c = data[0];
      const dataWydania = new Date(c.data_wydania).toLocaleDateString('pl-PL');
      const dataUkonczenia = c.data_ukonczenia 
        ? new Date(c.data_ukonczenia).toLocaleDateString('pl-PL') 
        : '—';
      const aktywny = c.status === 'aktywny';

      result.innerHTML = `
        <div class="result-${aktywny ? 'valid' : 'invalid'}">
          <div class="result-status">
            <div class="status-icon icon-${aktywny ? 'valid' : 'invalid'}">${aktywny ? '✓' : '✗'}</div>
            <div class="status-text text-${aktywny ? 'valid' : 'invalid'}">
              Certyfikat ${aktywny ? 'autentyczny i ważny' : 'nieważny lub unieważniony'}
            </div>
          </div>
          <div class="cert-details">
            <div class="detail-row">
              <div class="detail-label">Uczestnik</div>
              <div class="detail-value">${c.imie_nazwisko.split(' ').map(w => w[0] + '*'.repeat(w.length - 1)).join(' ')}</div>
            </div>
            <div class="divider"></div>
            <div class="detail-row">
              <div class="detail-label">Kurs</div>
              <div class="detail-value">${c.kurs}</div>
            </div>
            <div class="divider"></div>
            <div class="detail-row">
              <div class="detail-label">Data ukończenia</div>
              <div class="detail-value">${dataUkonczenia}</div>
            </div>
            <div class="divider"></div>
            <div class="detail-row">
              <div class="detail-label">Data wydania</div>
              <div class="detail-value">${dataWydania}</div>
            </div>
          </div>
          <div class="cert-number">Nr certyfikatu: ${c.numer}</div>
        </div>
      `;
    } else {
      result.innerHTML = `
        <div class="result-invalid">
          <div class="result-status">
            <div class="status-icon icon-invalid">✗</div>
            <div class="status-text text-invalid">Nie znaleziono certyfikatu</div>
          </div>
          <p style="font-size:13px;color:#888;margin-top:8px;">
            Certyfikat o numerze <strong>${numer}</strong> nie istnieje w naszej bazie. 
            Sprawdź czy numer został wpisany poprawnie.
          </p>
        </div>
      `;
    }
  } catch(e) {
    loading.style.display = 'none';
    result.style.display = 'block';
    result.innerHTML = `<div class="result-invalid"><p style="color:#c62828;font-size:13px;">Błąd połączenia. Spróbuj ponownie.</p></div>`;
  }

  btn.disabled = false;
}
</script>
</body>
</html>
